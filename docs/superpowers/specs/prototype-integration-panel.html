<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机器人集成管理面板 - PRD 原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

  /* ActivityBar */
  .activity-bar {
    width: 48px; background: #16162a; border-right: 1px solid #2a2a45;
    display: flex; flex-direction: column; align-items: center; padding: 8px 0;
    flex-shrink: 0;
  }
  .ab-icon {
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; cursor: pointer; color: #888; font-size: 18px; margin-bottom: 4px;
    transition: all 0.15s;
  }
  .ab-icon:hover { background: #2a2a45; color: #bbb; }
  .ab-icon.active { color: #7c6fff; background: rgba(124,111,255,0.1); border-left: 2px solid #7c6fff; }
  .ab-spacer { flex: 1; }
  .ab-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* LeftPanel */
  .left-panel {
    width: 300px; background: #1e1e36; border-right: 1px solid #2a2a45;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }

  /* Panel Header */
  .panel-header {
    padding: 12px 16px; border-bottom: 1px solid #2a2a45;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-header h3 { font-size: 13px; font-weight: 600; color: #e0e0e0; }

  /* Platform Tabs */
  .platform-tabs {
    display: flex; border-bottom: 1px solid #2a2a45;
  }
  .platform-tab {
    flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 500;
    cursor: pointer; color: #888; border-bottom: 2px solid transparent;
    transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none;
  }
  .platform-tab:hover { color: #bbb; }
  .platform-tab.active { color: #7c6fff; border-bottom-color: #7c6fff; }

  /* Panel Content */
  .panel-content { flex: 1; overflow-y: auto; padding: 12px; }

  /* Section */
  .section { margin-bottom: 16px; }
  .section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }

  /* Instance Card */
  .instance-card {
    background: #252545; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
  }
  .instance-card:hover { border-color: #3a3a5a; }
  .instance-card.active { border-color: #7c6fff; background: rgba(124,111,255,0.05); }
  .instance-top { display: flex; align-items: center; justify-content: space-between; }
  .instance-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
  .instance-actions { display: flex; align-items: center; gap: 6px; }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
  }
  .badge-ready { background: rgba(52,211,153,0.15); color: #34d399; }
  .badge-disconnected { background: rgba(136,136,136,0.15); color: #888; }
  .badge-connecting { background: rgba(251,191,36,0.15); color: #fbbf24; animation: pulse 1.5s infinite; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-ready .badge-dot { background: #34d399; }
  .badge-disconnected .badge-dot { background: #666; }
  .badge-connecting .badge-dot { background: #fbbf24; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Buttons */
  .btn {
    font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid #3a3a5a; background: transparent; color: #aaa; transition: all 0.15s;
  }
  .btn:hover { border-color: #5a5a7a; color: #e0e0e0; }
  .btn-primary { background: #7c6fff; color: #fff; border-color: #7c6fff; }
  .btn-primary:hover { background: #6a5fef; }
  .btn-danger { color: #f87171; border-color: rgba(248,113,113,0.3); }
  .btn-danger:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }
  .btn-sm { padding: 3px 8px; font-size: 10px; }
  .btn-ghost { border: none; color: #888; }
  .btn-ghost:hover { color: #e0e0e0; background: rgba(255,255,255,0.05); }

  /* Config Form */
  .config-section {
    background: #252545; border-radius: 8px; padding: 12px; margin-top: 4px;
  }
  .form-group { margin-bottom: 10px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
  .form-input {
    width: 100%; padding: 7px 10px; background: #1e1e36; border: 1px solid #2a2a45;
    border-radius: 6px; color: #e0e0e0; font-size: 12px; outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: #7c6fff; }
  .form-input::placeholder { color: #555; }

  .config-actions {
    display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid #2a2a45;
  }
  .config-actions .btn { flex: 1; text-align: center; padding: 6px 0; }

  /* Add instance */
  .add-btn {
    width: 100%; padding: 8px; background: transparent; border: 1px dashed #3a3a5a;
    border-radius: 8px; color: #888; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .add-btn:hover { border-color: #7c6fff; color: #7c6fff; }

  /* Right area placeholder */
  .main-area {
    flex: 1; background: #1a1a2e; display: flex; align-items: center; justify-content: center;
    color: #444; font-size: 14px;
  }

  /* Info hint */
  .info-hint {
    font-size: 11px; color: #666; padding: 8px 0; line-height: 1.5;
  }

  /* Illustration overlay */
  .annotation {
    position: absolute; font-size: 11px; color: #7c6fff; font-weight: 500;
    background: rgba(124,111,255,0.1); padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; pointer-events: none;
  }
  .annotation::after {
    content: ''; position: absolute; width: 1px; height: 20px;
    background: #7c6fff; opacity: 0.5;
  }

  /* Page header */
  .page-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #16162a; border-bottom: 1px solid #2a2a45; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header h1 { font-size: 14px; font-weight: 600; color: #e0e0e0; }
  .page-header span { font-size: 12px; color: #888; }

  .prototype-wrapper {
    margin-top: 42px; display: flex; flex: 1; overflow: hidden;
  }

  /* Divider annotation */
  .divider-note {
    position: absolute; right: -8px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 40px; background: #7c6fff; opacity: 0.3; border-radius: 2px;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>PRD 原型：机器人集成管理面板</h1>
  <span>需求 ID: 2ceb32cd | 优先级: High</span>
</div>

<div class="prototype-wrapper">
  <!-- ActivityBar -->
  <div class="activity-bar">
    <div class="ab-icon" title="文件">
      <svg viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
    </div>
    <div class="ab-icon" title="Git">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v6m0 6v6"/></svg>
    </div>
    <div class="ab-icon" title="待办">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <div class="ab-icon active" title="机器人" style="position:relative">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="9" cy="16" r="1.5"/><circle cx="15" cy="16" r="1.5"/><path d="M12 2v4m-3-2h6"/></svg>
      <span class="annotation" style="left: 52px; top: -2px;">① ActivityBar 入口</span>
    </div>
    <div class="ab-icon" title="定时任务">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <div class="ab-spacer"></div>
    <div class="ab-icon" title="设置">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>
  </div>

  <!-- LeftPanel - Integration -->
  <div class="left-panel" style="position: relative;">
    <div class="panel-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c6fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="9" cy="16" r="1.5"/><circle cx="15" cy="16" r="1.5"/><path d="M12 2v4m-3-2h6"/></svg>
      <h3>机器人管理</h3>
    </div>

    <!-- ② Platform Tabs -->
    <div class="platform-tabs" style="position: relative;">
      <button class="platform-tab active" id="tab-qq" onclick="switchPlatform('qq')">QQ Bot</button>
      <button class="platform-tab" id="tab-feishu" onclick="switchPlatform('feishu')">飞书</button>
      <span class="annotation" style="left: 50%; top: 36px; transform: translateX(-50%);">② 平台切换 Tab</span>
    </div>

    <div class="panel-content">
      <!-- ③ Instance List -->
      <div class="section" style="position: relative;">
        <div class="section-title">实例</div>

        <!-- Active instance - connected -->
        <div class="instance-card active">
          <div class="instance-top">
            <div class="instance-name">生产机器人</div>
            <div class="instance-actions">
              <span class="badge badge-ready"><span class="badge-dot"></span>已就绪</span>
              <button class="btn btn-sm btn-danger">断开</button>
            </div>
          </div>
          <div style="font-size: 11px; color: #666; margin-top: 4px;">App ID: 102024...  |  📂 D:\project\myapp</div>
        </div>

        <!-- Inactive instance -->
        <div class="instance-card">
          <div class="instance-top">
            <div class="instance-name">测试机器人</div>
            <div class="instance-actions">
              <span class="badge badge-disconnected"><span class="badge-dot"></span>未激活</span>
              <button class="btn btn-sm">切换</button>
            </div>
          </div>
          <div style="font-size: 11px; color: #666; margin-top: 4px;">App ID: 103825...</div>
        </div>

        <button class="add-btn">+ 添加实例</button>

        <span class="annotation" style="right: -12px; top: 20px;">③ 实例列表</span>
      </div>

      <!-- ④ Quick Config -->
      <div class="section" style="position: relative;">
        <div class="section-title">快速配置</div>
        <div class="config-section">
          <div class="form-group">
            <label class="form-label">App ID</label>
            <input class="form-input" type="text" value="102024885" placeholder="QQ 开放平台应用 App ID">
          </div>
          <div class="form-group">
            <label class="form-label">Client Secret</label>
            <input class="form-input" type="password" value="••••••••••" placeholder="Client Secret">
          </div>
          <div class="form-group">
            <label class="form-label">默认工作区</label>
            <input class="form-input" type="text" value="D:\project\myapp" placeholder="新会话自动使用此目录">
          </div>

          <div class="config-actions">
            <button class="btn">保存</button>
            <button class="btn btn-primary">连接</button>
          </div>
        </div>

        <span class="annotation" style="right: -12px; top: 30px;">④ 轻量配置</span>
      </div>

      <!-- ⑤ Status Info -->
      <div class="section">
        <div class="info-hint">
          💡 提示：完整配置请在 <span style="color: #7c6fff; cursor: pointer;">设置 → QQ Bot</span> 中查看
        </div>
      </div>
    </div>

    <div class="divider-note" style="right: -4px;"></div>
  </div>

  <!-- Main Area Placeholder -->
  <div class="main-area">
    <div style="text-align: center;">
      <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.2;">💬</div>
      <div>AI 对话区域</div>
      <div style="font-size: 12px; margin-top: 8px; color: #333;">左侧面板不遮挡此区域</div>
    </div>
  </div>
</div>

<script>
function switchPlatform(platform) {
  document.getElementById('tab-qq').classList.toggle('active', platform === 'qq');
  document.getElementById('tab-feishu').classList.toggle('active', platform === 'feishu');

  // 模拟切换平台时的配置变化
  const formInputs = document.querySelectorAll('.form-input');
  if (platform === 'feishu') {
    document.querySelector('.section-title').textContent = '实例';
    formInputs[1].placeholder = 'App Secret';
    // 更新标签
    document.querySelectorAll('.form-label')[1].textContent = 'App Secret';
  } else {
    document.querySelector('.section-title').textContent = '实例';
    formInputs[1].placeholder = 'Client Secret';
    document.querySelectorAll('.form-label')[1].textContent = 'Client Secret';
  }
}
</script>
</body>
</html>
